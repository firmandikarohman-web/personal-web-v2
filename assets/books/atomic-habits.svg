<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
  </defs>
  <rect width="300" height="450" rx="8" fill="url(#bg)"/>
  <!-- Atom circles -->
  <ellipse cx="150" cy="200" rx="80" ry="30" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6" transform="rotate(0 150 200)"/>
  <ellipse cx="150" cy="200" rx="80" ry="30" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6" transform="rotate(60 150 200)"/>
  <ellipse cx="150" cy="200" rx="80" ry="30" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6" transform="rotate(120 150 200)"/>
  <circle cx="150" cy="200" r="8" fill="#f39c12"/>
  <!-- Title -->
  <text x="150" y="340" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="28" font-weight="bold">Atomic Habits</text>
  <text x="150" y="375" text-anchor="middle" fill="#aaa" font-family="Arial, sans-serif" font-size="16">James Clear</text>
</svg>
